<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Employee Management System</title>

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="style.css" rel="stylesheet">

    <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>
</head>

<body>

    <!-- TOP BAR -->
    <div class="top-bar">
        <h4>Employee Dashboard</h4>
        <button class="btn btn-light" onclick="openAddModal()">+ Add Employee</button>
    </div>

    <div class="container py-4">

        <!-- SEARCH -->
        <div class="card p-3 mb-3">
            <input type="text" id="searchInput" class="form-control"
                   placeholder="Search employee by name">
        </div>

        <!-- TABLE -->
        <div class="card p-3">

            <div class="d-flex justify-content-between mb-2">
                <button class="btn btn-outline-dark btn-sm" onclick="sortByName()">Sort Name</button>
                <button class="btn btn-outline-dark btn-sm" onclick="sortByDepartment()">Sort Department</button>
            </div>

            <div class="table-responsive">
                <table class="table align-middle">
                    <thead>
                        <tr>
                            <th>Name</th>
                            <th>Email</th>
                            <th>Mobile</th>
                            <th>Department</th>
                            <th>Job</th>
                            <th>Hire Date</th>
                            <th>Actions</th>
                        </tr>
                    </thead>

                    <tbody id="empTable"></tbody>
                </table>
            </div>

            <div id="pagination" class="pagination-bar"></div>

        </div>
    </div>


    <!-- MODERN MODAL -->
    <div class="modal fade" id="empModal" tabindex="-1">
        <div class="modal-dialog modal-dialog-centered modal-lg">

            <div class="modal-content glass-modal">

                <div class="modal-header border-0">
                    <h5 class="modal-title">Employee Form</h5>
                    <button type="button" class="btn-close" data-bs-dismiss="modal"></button>
                </div>

                <div class="modal-body">

                    <input type="hidden" id="empId">

                    <div class="row g-3">

                        <div class="col-md-6">
                            <input id="fullName" class="form-control" placeholder="Full Name">
                        </div>

                        <div class="col-md-6">
                            <input id="email" class="form-control" placeholder="Email">
                        </div>

                        <div class="col-md-6">
                            <input id="mobile" class="form-control" placeholder="Mobile">
                        </div>

                        <div class="col-md-6">
                            <select id="departmentSelect" class="form-control"></select>
                        </div>

                        <div class="col-md-6">
                            <input id="jobTitle" class="form-control" placeholder="Job Title">
                        </div>

                        <div class="col-md-6">
                            <input id="hireDate" type="date" class="form-control">
                        </div>

                        <div class="col-md-6">
                            <select id="isActive" class="form-control">
                                <option value="true">Active</option>
                                <option value="false">Inactive</option>
                            </select>
                        </div>

                    </div>

                </div>

                <div class="modal-footer border-0">
                    <button class="btn btn-secondary" data-bs-dismiss="modal">Close</button>
                    <button class="btn btn-success" onclick="saveEmployee()">Save</button>
                </div>

            </div>
        </div>
    </div>


    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
    <script src="app.js"></script>

</body>
</html>
